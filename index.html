
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TFT 통계 홈</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
}

header {
    padding: 30px 40px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

h1 {
    margin: 0;
    font-size: 32px;
}

.subtitle {
    color: #94a3b8;
    margin-top: 8px;
}

nav {
    margin-top: 22px;
}

nav a {
    color: #cbd5e1;
    text-decoration: none;
    margin-right: 12px;
    padding: 8px 14px;
    border-radius: 999px;
    background: #111827;
}

nav a.active {
    background: #facc15;
    color: #111827;
    font-weight: bold;
}

main {
    padding: 40px;
}

.card {
    background: #111827;
    padding: 24px;
    border-radius: 18px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

h2 {
    color: #facc15;
}

.search {
    background: #020617;
    color: white;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 10px 14px;
    width: 260px;
}

.filters {
    margin: 18px 0;
}

.filters button {
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
    padding: 8px 13px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 6px;
}

.filters button:hover {
    background: #334155;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1e293b;
    padding: 12px;
    cursor: pointer;
    user-select: none;
}

td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: center;
}

tr:hover {
    background: #1e293b;
    cursor: pointer;
}

.name-cell {
    text-align: left;
    font-weight: bold;
}

.badge {
    font-weight: bold;
    padding: 5px 12px;
    border-radius: 999px;
}

.badge-S { background: #facc15; color: #111827; }
.badge-A { background: #38bdf8; color: #111827; }
.badge-B { background: #4ade80; color: #111827; }
.badge-C { background: #c084fc; color: #111827; }
.badge-D { background: #f87171; color: #111827; }

.home-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
}

.home-card {
    background: #111827;
    padding: 28px;
    border-radius: 18px;
    text-decoration: none;
    color: white;
    border: 1px solid #1e293b;
}

.home-card:hover {
    background: #1e293b;
}

.modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal {
    background: #111827;
    border: 1px solid #334155;
    border-radius: 18px;
    padding: 28px;
    width: 360px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.modal h2 {
    margin-top: 0;
}

.modal p {
    color: #cbd5e1;
}

.close-btn {
    margin-top: 16px;
    width: 100%;
    background: #facc15;
    color: #111827;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

@media (max-width: 900px) {
    .home-grid {
        grid-template-columns: 1fr;
    }

    .section-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .search {
        width: 100%;
    }
}
</style>
</head>

<body>
<header>
    <h1>TFT Challenger Data Analysis</h1>
    <div class="subtitle">한국 챌린저 4466경기 / 35,539명 플레이어 분석</div>
    <nav><a class="active" href="index.html">홈</a><a class="" href="units.html">기물</a><a class="" href="items.html">아이템</a><a class="" href="traits.html">시너지</a><a class="" href="about.html">프로젝트 소개</a></nav>
</header>

<main>

    <div class="home-grid">
        <a class="home-card" href="units.html">
            <h2>기물 티어표</h2>
            <p>기물별 평균 등수, TOP4률, 1등률, 채용률을 확인합니다.</p>
        </a>

        <a class="home-card" href="items.html">
            <h2>아이템 티어표</h2>
            <p>아이템별 성능과 채용률을 확인합니다.</p>
        </a>

        <a class="home-card" href="traits.html">
            <h2>시너지 티어표</h2>
            <p>시너지별 평균 성적과 티어를 확인합니다.</p>
        </a>
        <a class="home-card" href="about.html">
    <h2>프로젝트 소개</h2>
    <p>
        데이터 수집 과정, 분석 방법,
        티어 계산 기준 및 프로젝트 설명을 확인합니다.
    </p>
</a>
    </div>
    
</main>
</body>
</html>
